<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/pages/blog.css" />
    <title>Destino - TurArg</title>
  </head>
  <body>
    <!-- Encabezado -->
    <header>
      <nav class="navbar">
        <ul class="nav-links">
          <a href="index.html" class="logo-container">
            <img
              src="assets/images/TurArg-logo.webp"
              alt="Logo de Turi-Arg"
              title="Turi-Arg"
              class="logo"
            />
            <p class="">TurArg</p>
          </a>
          <li class="dropdown">
            <a href="#">Menu</a>
            <ul class="dropdown-menu">
              <li><a href="destino.html">Destino</a></li>
              <li><a href="#">Agencia</a></li>
              <li><a href="#">Precio</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="destination-main"></main>

    <!-- Pie de página -->
    <footer>
      <div class="footer-container">
        <!-- Sección Newsletter -->
        <div class="footer-section-newsletter">
          <h3 class="footer-newsletter-title">Newsletter</h3>
          <p class="footer-newsletter-description">
            Suscríbete para recibir las mejores ofertas y promociones sobre
            destinos turísticos en Argentina.
          </p>
          <form class="newsletter-form">
            <input type="email" placeholder="Tu correo electrónico" required />
            <button type="submit">Suscribirse</button>
          </form>
        </div>

        <!-- Sección Redes Sociales -->
        <div class="footer-section-social">
          <h3 class="footer-social-title">Síguenos</h3>
          <div class="social-links">
            <a href="#" class="social-link" title="Facebook">f</a>
            <a href="#" class="social-link" title="Twitter">𝕏</a>
            <a href="#" class="social-link" title="Instagram">📷</a>
            <a href="#" class="social-link" title="LinkedIn">in</a>
            <a href="#" class="social-link" title="YouTube">▶</a>
          </div>
        </div>

        <!-- Sección Mapa Interactivo -->
        <div class="footer-section-map">
          <h3 class="footer-map-title">Ubicación</h3>
          <div class="map-container">
            <iframe
              src="https://www.openstreetmap.org/export/embed.html?bbox=-73.5,-56.0,-53.6,-21.8&layer=mapnik&marker=-38.4161,-63.6167"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            >
            </iframe>
          </div>
        </div>
      </div>

      <!-- Footer Bottom -->
      <div class="footer-bottom">
        <p class="footer-copyright">
          &copy; 2024 <strong>TurArg</strong>. Todos los derechos reservados.
        </p>
      </div>
    </footer>
  </body>
</html>
